{% comment %}
One free-form leader goal row. Expects: gform (a LeaderGoalForm). Used both in
the goals loop and inside the add-row <template>, so keep it self-contained.
{% endcomment %}
<div class="reflection-card" data-formset-row>
  <div class="reflection-card-body">
    {{ gform.id }}
    <div class="field-row">
      <label for="{{ gform.goal.id_for_label }}">Goal</label>
      {{ gform.goal }}
      {% if gform.goal.errors %}<div class="field-errors">{{ gform.goal.errors }}</div>{% endif %}
    </div>
    <div class="field-row">
      <label for="{{ gform.evidence_and_discussion.id_for_label }}">Evidence and points for discussion</label>
      {{ gform.evidence_and_discussion }}
    </div>
    <div class="field-row">
      <span class="field-label">Achieved?</span>
      {% include "appraisals/_widgets/yesno.html" with field=gform.achieved %}
    </div>
    {% if not locked %}
      <div class="field-row leader-goal-delete" hidden>{{ gform.DELETE }}</div>
      <div class="actions actions--row">
        <button type="button" class="btn-link" data-formset-remove>Remove goal</button>
      </div>
    {% endif %}
  </div>
</div>
